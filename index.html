<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Cobrador">
  <meta name="theme-color" content="#4F7CBA">
  <meta name="description" content="Gerenciador de mensalidades de pacientes">
  <title>Cobrador</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="app">
    <!-- Conteúdo renderizado pelo JavaScript -->
  </div>

  <nav id="bottom-nav">
    <button class="nav-btn active" data-page="pacientes">
      <span class="nav-icon">👥</span>
      <span class="nav-label">Pacientes</span>
    </button>
    <button class="nav-btn" data-page="apuracao">
      <span class="nav-icon">📋</span>
      <span class="nav-label">Apuração</span>
    </button>
    <button class="nav-btn" data-page="configuracoes">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Configurações</span>
    </button>
  </nav>

  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
